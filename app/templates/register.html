{% extends "base.html" %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow border-0 rounded-4">
                <div class="card-header bg-primary text-white">
                    <h3 class="card-title mb-0">Register</h3>
                </div>
                <div class="card-body p-4">
                    {% if error %}
                    <div class="alert alert-danger mb-4 shadow-sm" role="alert">
                        <strong>Error:</strong> {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST" action="/register">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" value="{{ username or '' }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ email or '' }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" name="password" required>
                                <button class="btn btn-outline-secondary password-toggle-btn" type="button" data-password-toggle data-target="password" aria-label="Show password">
                                    <span class="password-icon password-icon-eye" aria-hidden="true">
                                        <svg viewBox="0 0 24 24" focusable="false">
                                            <path d="M2.1 12s3.6-6.5 9.9-6.5S21.9 12 21.9 12s-3.6 6.5-9.9 6.5S2.1 12 2.1 12Z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </svg>
                                    </span>
                                    <span class="password-icon password-icon-eye-off" aria-hidden="true">
                                        <svg viewBox="0 0 24 24" focusable="false">
                                            <path d="M2 12s3.8-6 10-6 10 6 10 6-3.8 6-10 6S2 12 2 12Z"></path>
                                            <circle cx="12" cy="12" r="3.2"></circle>
                                            <path d="M4.2 19.8 19.8 4.2"></path>
                                        </svg>
                                    </span>
                                    <span class="visually-hidden">Show password</span>
                                </button>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label">Confirm Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                                <button class="btn btn-outline-secondary password-toggle-btn" type="button" data-password-toggle data-target="confirm_password" aria-label="Show confirm password">
                                    <span class="password-icon password-icon-eye" aria-hidden="true">
                                        <svg viewBox="0 0 24 24" focusable="false">
                                            <path d="M2.1 12s3.6-6.5 9.9-6.5S21.9 12 21.9 12s-3.6 6.5-9.9 6.5S2.1 12 2.1 12Z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </svg>
                                    </span>
                                    <span class="password-icon password-icon-eye-off" aria-hidden="true">
                                        <svg viewBox="0 0 24 24" focusable="false">
                                            <path d="M2 12s3.8-6 10-6 10 6 10 6-3.8 6-10 6S2 12 2 12Z"></path>
                                            <circle cx="12" cy="12" r="3.2"></circle>
                                            <path d="M4.2 19.8 19.8 4.2"></path>
                                        </svg>
                                    </span>
                                    <span class="visually-hidden">Show confirm password</span>
                                </button>
                            </div>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
                        </div>

                        <div class="text-center mt-3">
                            <span class="text-muted">Already have an account?</span>
                            <a href="/login" class="link-primary fw-semibold text-decoration-none">Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
