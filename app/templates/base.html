<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}?v=landing-polish-2">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Flood Prediction</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <div class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <a class="nav-link text-white" href="/">Home</a>
                {% if current_user %}
                <a class="nav-link text-white" href="/predict">Predict</a>
                <a class="nav-link text-white" href="/history">Dashboard</a>
                <a class="nav-link text-white" href="/logout">Logout</a>
                {% else %}
                <a class="nav-link text-white" href="/#about">About</a>
                <a class="nav-link text-white" href="/login">Login</a>
                <a class="nav-link text-white" href="/register">Register</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', path='/js/script.js') }}"></script>
</body>
</html>
