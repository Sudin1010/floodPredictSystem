{% extends "base.html" %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow border-0 rounded-4">
                <div class="card-header bg-primary text-white">
                    <h3 class="card-title mb-0">Login</h3>
                </div>
                <div class="card-body p-4">
                    {% if error %}
                    <div class="alert alert-danger mb-4 shadow-sm" role="alert">
                        <strong>Error:</strong> {{ error }}
                    </div>
                    {% endif %}
                    {% if success %}
                    <div class="alert alert-success mb-4 shadow-sm" role="alert">
                        {{ success }}
                    </div>
                    {% endif %}
                    {% if info %}
                    <div class="alert alert-info mb-4 shadow-sm" role="alert">
                        {{ info }}
                    </div>
                    {% endif %}

                    <form method="POST" action="/login">
                        <div class="mb-3">
                            <label for="username_or_email" class="form-label">Username or Email</label>
                            <input type="text" class="form-control" id="username_or_email" name="username_or_email" value="{{ username_or_email or '' }}" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" name="password" required>
                                <button class="btn btn-outline-secondary password-toggle-btn" type="button" data-password-toggle data-target="password" aria-label="Show password">
                                    <span class="password-icon password-icon-eye" aria-hidden="true">
                                        <svg viewBox="0 0 24 24" focusable="false">
                                            <path d="M2.1 12s3.6-6.5 9.9-6.5S21.9 12 21.9 12s-3.6 6.5-9.9 6.5S2.1 12 2.1 12Z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </svg>
                                    </span>
                                    <span class="password-icon password-icon-eye-off" aria-hidden="true">
                                        <svg viewBox="0 0 24 24" focusable="false">
                                            <path d="M2 12s3.8-6 10-6 10 6 10 6-3.8 6-10 6S2 12 2 12Z"></path>
                                            <circle cx="12" cy="12" r="3.2"></circle>
                                            <path d="M4.2 19.8 19.8 4.2"></path>
                                        </svg>
                                    </span>
                                    <span class="visually-hidden">Show password</span>
                                </button>
                            </div>
                        </div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="/register" class="btn btn-outline-secondary me-md-2">Register</a>
                            <button type="submit" class="btn btn-primary">Login</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
